name: Deploy ZealPalace to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build site
        run: |
          mkdir -p _site
          cp site/index.html _site/
          cp site/style.css _site/
          cp site/404.html _site/ 2>/dev/null || true
          mkdir -p _site/images
          cp Docs/*.png _site/images/ 2>/dev/null || true
          cp Docs/*.jpg _site/images/ 2>/dev/null || true
          cp Docs/*.jpeg _site/images/ 2>/dev/null || true

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
