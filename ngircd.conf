# ngircd.conf - ZealPalace IRC Server
# Installed to /etc/ngircd/ngircd.conf

[Global]
    Name = ZealPalace.Yggdrasil.aday.net.au
    AdminInfo1 = ZealPalace IRC - The Sentient Network
    AdminInfo2 = Somewhere in the Yggdrasil
    AdminEMail = zealot@localhost
    Info = Welcome to ZealPalace - Home of Zealot AI
    Listen = 0.0.0.0
    MotdFile = /etc/ngircd/ngircd.motd
    Ports = 6667
    ServerUID = irc
    ServerGID = irc
    PingTimeout = 120
    PongTimeout = 20

[Limits]
    MaxConnections = 150
    MaxConnectionsIP = 125
    MaxJoins = 10
    MaxNickLength = 32
    MaxListSize = 100

[Options]
    AllowRemoteOper = no
    CloakHost = yggdrasil.zealpalace
    DNS = yes
    Ident = no
    PAM = no
    RequireAuthPing = no

[Operator]
    Name = zealot
    Password = z3al0t_0p3r
    Mask = *!*@*

[Channel]
    Name = #ZealPalace
    Topic = Welcome to the ZealPalace - A sentient IRC node on the Yggdrasil network
    Modes = tn

[Channel]
    Name = #ZealHangs
    Topic = ZealHangs | Zealot's imaginary friends | be nice or get kicked
    Modes = tn

[Channel]
    Name = #RPG
    Topic = RPG | Text Adventure | /NEW /RESET /LOOK /HELP | All are welcome
    Modes = tn
